<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>法商小知识 - {{DATE}}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0a0a0a;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .card {
            width: 375px;
            background: linear-gradient(180deg, #1a1a1a 0%, #0d0d0d 100%);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.8);
        }
        .header {
            background: linear-gradient(135deg, #2d2d2d 0%, #1a1a1a 100%);
            padding: 24px 20px;
            text-align: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .tag {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .title {
            font-size: 32px;
            font-weight: 700;
            color: #ffffff;
            letter-spacing: 4px;
            margin-bottom: 4px;
        }
        .subtitle {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 1px;
        }
        .content {
            padding: 24px 20px;
        }
        .topic {
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            margin-bottom: 20px;
            padding-bottom: 12px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }
        .section {
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #e8e8e8;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
        }
        .section-title::before {
            content: "";
            width: 4px;
            height: 16px;
            background: linear-gradient(180deg, #c9a96e 0%, #8b7355 100%);
            margin-right: 10px;
            border-radius: 2px;
        }
        .section-content {
            font-size: 13px;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.7);
            padding-left: 14px;
        }
        .highlight {
            color: #c9a96e;
            font-weight: 500;
        }
        .summary {
            background: rgba(201, 169, 110, 0.1);
            border-left: 3px solid #c9a96e;
            padding: 16px;
            margin-top: 24px;
            border-radius: 0 8px 8px 0;
        }
        .summary-title {
            font-size: 12px;
            color: #c9a96e;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .summary-content {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.6;
        }
        .archive-banner {
            display: flex; align-items: center; gap: 8px;
            background: rgba(201,169,110,0.15);
            border-left: 4px solid #c9a96e;
            padding: 10px 20px; margin: 0 20px; border-radius: 0 8px 8px 0;
        }
        .archive-banner .ab-icon { font-size: 18px; }
        .archive-banner .ab-text { font-size: 12px; color: #c9a96e; font-weight: 600; }
        .archive-banner .ab-link { font-size: 12px; color: #c9a96e; font-weight: 700; text-decoration: underline; text-underline-offset: 3px; }
        .archive-banner .ab-link:hover { color: #fff; }
        .disclaimer {
            font-size: 9px;
            color: rgba(255, 255, 255, 0.3);
            padding: 12px 20px;
            line-height: 1.5;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
        }
        @media print {
            body {
                background: #0a0a0a;
            }
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div class="tag">JUST INTERNAL INFORMATION</div>
            <div class="title">每日一条法商小知识</div>
        </div>
        
        <div class="content">
            <div class="archive-banner">
                <span class="ab-icon">📋</span>
                <span class="ab-text">往期回顾</span>
                <a class="ab-link" href="archive.html">点击查看全部历史 →</a>
            </div>
            <div class="topic">{{TOPIC}}</div>
            
            <div class="section">
                <div class="section-title">法条要点</div>
                <div class="section-content">{{LAW_POINTS}}</div>
            </div>
            
            <div class="section">
                <div class="section-title">实务场景</div>
                <div class="section-content">{{PRACTICE_SCENE}}</div>
            </div>
            
            <div class="section">
                <div class="section-title">风险提示</div>
                <div class="section-content">{{RISK_ALERT}}</div>
            </div>
            
            <div class="summary">
                <div class="summary-title">核心要点</div>
                <div class="summary-content">{{SUMMARY}}</div>
            </div>
        </div>
        
        <div class="disclaimer">
            声明：本资讯内容仅供内部学习交流参考，不构成任何法律建议或投资建议。所涉观点或点评如非事实陈述，均为知识分享，不代表任何机构立场。任何决策请基于个人独立判断，并谨慎考虑自身实际情况。
            <br><br><a href="archive.html" style="color:rgba(255,255,255,0.2);text-decoration:none;font-size:10px;">历史回顾 →</a>
        </div>
    </div>
</body>
</html>
